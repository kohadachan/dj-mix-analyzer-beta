name: Bug Report / 不具合報告
description: Report a bug or crash / 不具合やクラッシュの報告
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the fields below as much as possible.
        不具合のご報告ありがとうございます。以下の項目をできる範囲で記入してください。

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10
        - Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version / アプリバージョン
      description: "Check in Settings tab or installer filename / Settings タブまたはインストーラーのファイル名で確認できます"
      placeholder: "0.2.5"
    validations:
      required: true

  - type: dropdown
    id: installer
    attributes:
      label: Installer Type / インストーラーの種類
      options:
        - DMG (macOS)
        - EXE / NSIS (Windows)
        - MSI (Windows)
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description / 不具合の内容
      description: Describe what happened / 何が起きたかを具体的に記載してください
      placeholder: |
        e.g.: When importing Serato session files, the progress bar stopped midway and an error appeared.
        例: Seratoのセッションファイルをインポートしようとしたら、プログレスバーが途中で止まりエラーが表示された
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 再現手順
      description: How to reproduce the bug / 不具合を再現するための手順を記載してください
      placeholder: |
        1. Go to Library > Import
        2. Select the session folder via "Browse Folder..."
        3. ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期待される動作
      description: What should have happened / 本来どうなるべきだったか
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 実際の動作
      description: What actually happened (include error messages if any) / 実際に何が起きたか（エラーメッセージがあればそのまま記載）
    validations:
      required: false

  - type: textarea
    id: data-source
    attributes:
      label: DJ Software Used / 使用しているDJソフトウェア
      description: |
        Which DJ software and approximately how many files?
        データの取り込み元として使っているDJソフトウェアと、おおよそのファイル数を教えてください
      placeholder: |
        e.g.: Serato DJ Pro, ~200 session files
        例: Serato DJ Pro、セッションファイル約200個
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / スクリーンショット
      description: Attach screenshots if available / 不具合の画面キャプチャがあれば添付してください
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Info / その他
      description: Any additional context / 追加情報があれば記載してください
    validations:
      required: false
